name: CI/CD PR1 Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Build Success
      run: echo "Build completed successfully ✅"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deployment
      run: echo "Deployment successful 🚀"